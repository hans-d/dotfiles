# based on https://github.com/necolas/dotfiles

prompt_git() {

    local status=""
    local branch=""
    local root=""
    local template="$1"
    local temp=""

    # check if the current directory is in a git repository
    if [ $(git rev-parse --is-inside-work-tree &>/dev/null; printf "%s" $?) == 0 ]; then

        # check if the current directory is in .git before running git checks
        if [ "$(git rev-parse --is-inside-git-dir 2> /dev/null)" == "false" ]; then

            # ensure index is up to date
            git update-index --really-refresh  -q &>/dev/null

            # check for uncommitted changes in the index
            if ! $(git diff --quiet --ignore-submodules --cached); then
                status+="+";
            fi

            # check for unstaged changes
            if ! $(git diff-files --quiet --ignore-submodules --); then
                status+="!";
            fi

            # check for untracked files
            if [ -n "$(git ls-files --others --exclude-standard)" ]; then
                status+="?";
            fi

            # check for stashed files
            if $(git rev-parse --verify refs/stash &>/dev/null); then
                status+="$";
            fi

            # check for commits not yet pushed
            temp=$(git rev-list @{u}.. | wc -l)
            if [ "$temp" -ne "0" ]; then
                status+="^$temp"
            fi

        fi

        # get the short symbolic ref
        # if HEAD isn't a symbolic ref, get the short SHA
        # otherwise, just give up
        branch="$(git symbolic-ref --quiet --short HEAD 2> /dev/null || \
                      git rev-parse --short HEAD 2> /dev/null || \
                      printf "(unknown)")"

        root="$(basename $(git rev-parse --show-toplevel))"

        [ -n "$status" ] && status="[$status]"

        template="${template/\#branch/$branch}"
        template="${template/\#root/$root}"
        template="${template/\#status/$status}"

        printf "%s" "$template"
    else
        return
    fi
}

set_prompts() {
    . ~/.bash/solarized.conf

    local hostStyle=""
    local userStyle=""

    # build the prompt

    # logged in as root
    if [[ "$USER" == "root" ]]; then
        userStyle=$promptUserRoot
    else
        userStyle=$promptUser
    fi

    # connected via ssh
    if [[ "$SSH_TTY" ]]; then
        hostStyle=$promptHostSSH
    else
        hostStyle=$promptHost
    fi

    local PS1_git=""
    PS1_git="\n\[$promptNormal\] git   :"
    PS1_git+="\[$promptGitBranch\] #branch"
    PS1_git+="\[$promptGitStatus\] #status"
    PS1_git+="\[$promptNormal\] (#root)"
    PS1_git="\$(prompt_git '$PS1_git' )" # git repository details

    local PS1_docker=""
    if [ -n "$DOCKER_MACHINE_NAME" ]; then
       PS1_docker="\n\[$promptNormal\] docker:"
       PS1_docker+="\[$promptDockerMachine\] $DOCKER_MACHINE_NAME"
    fi

    # set the terminal title to the current working directory
    PS1="\[\033]0;\w\007\]"
    PS1+="\n" # newline
    PS1+="\[$userStyle\]\u" # username
    PS1+="\[$promptNormal\]@"
    PS1+="\[$hostStyle\]\h" # host
    PS1+="\[$promptNormal\]: "
    PS1+="\[$promptWorkDir\]\W (\w)" # working directory
    PS1+="$PS1_git$PS1_docker"
    PS1+="\n\[$promptNormal\]\$ \[$reset\]" # $ (and reset color)

    export PS1
}

set_prompts
unset set_prompts
